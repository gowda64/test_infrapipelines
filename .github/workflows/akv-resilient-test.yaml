# Simplified workflow to validate and deploy resilient Key Vaults in a test subscription.
# Removes prod/nonprod/sandbox logic - uses single Azure credentials for testing.

name: akv-resilient-test
run-name: "test-${{ github.run_number }}-akv-resilient"

on:
  workflow_dispatch:
    inputs:
      tf_resource_json:
        description: 'JSON payload with Key Vault configuration'
        type: string
        required: true
      plan_only:
        description: 'Only run terraform plan (no apply)'
        type: boolean
        default: true

jobs:
  akv-resilient-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write payload to file
        run: |
          cat <<'EOF' > ${{ github.workspace }}/input.json
          ${{ github.event.inputs.tf_resource_json }}
          EOF
          echo "=== Input Payload ==="
          cat ${{ github.workspace }}/input.json | jq .

      - name: Validate and process payload
        id: payload
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          payload = json.loads((workspace / "input.json").read_text(encoding="utf-8"))

          print("=== Payload Validation ===")

          def normalize_bool(v, default=False):
              if isinstance(v, bool):
                  return v
              if isinstance(v, str):
                  return v.strip().lower() in {"true", "1", "yes", "y"}
              if v is None:
                  return default
              return bool(v)

          def validate_kv_name(name):
              """Azure Key Vault name: 3-24 chars, lowercase letters, numbers, hyphens, starts with a letter."""
              pattern = r"[a-z][a-z0-9-]{2,23}"
              if not re.fullmatch(pattern, name):
                  raise ValueError(f"Invalid key vault name '{name}'. Must be 3-24 chars, lowercase letters/numbers/hyphens, start with letter. Pattern: ^{pattern}$")
              print(f"  [OK] Key vault name '{name}' is valid")

          def derive_regional_name(base_name, region, role_suffix):
              """Derive region-specific key vault name from base name."""
              region_tokens = ["westus2", "westus", "eastus2", "eastus", "centralus", "northcentralus", "southcentralus"]
              segments = base_name.split("-")
              replaced = False
              for idx, seg in enumerate(segments):
                  if seg in region_tokens:
                      segments[idx] = region
                      replaced = True
                      break

              if replaced:
                  name = "-".join(segments)
              elif base_name.endswith("-pr") or base_name.endswith("-sr") or base_name.endswith("-dr"):
                  name = f"{base_name[:-3]}-{role_suffix}"
              else:
                  name = f"{base_name}-{role_suffix}"

              validate_kv_name(name)
              return name

          # Validate keyvault_name
          keyvault_name = payload.get("keyvault_name", "")
          if not keyvault_name:
              raise ValueError("Payload must include 'keyvault_name'")
          validate_kv_name(keyvault_name)

          # Validate subscription_id
          subscription_id = payload.get("subscription_id", "")
          if not subscription_id:
              raise ValueError("Payload must include 'subscription_id'")
          print(f"  [OK] subscription_id: {subscription_id}")

          # Validate regions
          regions = payload.get("regions")
          if not isinstance(regions, dict):
              raise ValueError("Payload must include 'regions' object")
          if len(regions.keys()) != 3:
              raise ValueError(f"Resilient deployment requires exactly 3 regions, got {len(regions.keys())}: {list(regions.keys())}")
          print(f"  [OK] regions count: {len(regions)}")

          kv_appcode = keyvault_name.split("-")[0]
          print(f"  [INFO] Derived appcode: {kv_appcode}")

          # Validate each region config
          print("\n=== Region Configuration ===")
          for region, cfg in regions.items():
              print(f"\nRegion: {region}")
              if not isinstance(cfg, dict):
                  raise ValueError(f"Region '{region}' config must be an object")
              
              required_fields = ["role_suffix", "kv_resource_group", "vnet_name", "subnet_name", "snet_rg_name"]
              for req in required_fields:
                  if not cfg.get(req):
                      raise ValueError(f"Region '{region}' missing required field: {req}")
                  print(f"  {req}: {cfg[req]}")

              # Derive regional key vault name
              cfg["keyvault_name"] = derive_regional_name(keyvault_name, region, cfg["role_suffix"])
              print(f"  derived keyvault_name: {cfg['keyvault_name']}")

              # Validate appcode consistency (optional - can be disabled for testing)
              if f"{kv_appcode}-" not in cfg["kv_resource_group"]:
                  print(f"  [WARN] Appcode '{kv_appcode}' not found in kv_resource_group '{cfg['kv_resource_group']}'")
              if f"{kv_appcode}-" not in cfg["subnet_name"]:
                  print(f"  [WARN] Appcode '{kv_appcode}' not found in subnet_name '{cfg['subnet_name']}'")

          # Build tfvars for Terraform
          tfvars = {
              "subscription_id": subscription_id,
              "tenant_id": payload.get("tenant_id", ""),
              "environment": payload.get("environment", "test"),
              "keyvault_name": keyvault_name,
              "regions": regions,
              "private_dns_zone_id": payload.get("private_dns_zone_id", ""),
              "private_dns_zone_rg_name": payload.get("private_dns_zone_rg_name", ""),
              "private_dns_zone_name": payload.get("private_dns_zone_name", "privatelink.vaultcore.azure.net"),
              "private_dns_zone_group": payload.get("private_dns_zone_group", "kv-privatelink"),
              "enforce_private_dns_zone_resolution": payload.get("enforce_private_dns_zone_resolution", False),
              "sku_name": payload.get("sku_name", "premium"),
              "purge_protection_enabled": normalize_bool(payload.get("purge_protection_enabled"), True),
              "rbac_assignments": payload.get("rbac_assignments", []),
              "RITM": payload.get("ritm", "TEST-RUN"),
              "skip_snow": True,
              "appcode": payload.get("appcode", kv_appcode),
              "appname": payload.get("appname", ""),
              "costcenter": payload.get("costcenter", ""),
              "portfolio": payload.get("portfolio", ""),
              "drtier": payload.get("drtier", ""),
          }

          # Build targets list for existence check
          targets = []
          for region, cfg in regions.items():
              targets.append({
                  "name": cfg["keyvault_name"],
                  "resource_group": cfg["kv_resource_group"],
                  "region": region,
              })

          # Write outputs
          module_dir = workspace / "infrastructure" / "akv-resilient"
          module_dir.mkdir(parents=True, exist_ok=True)
          
          (module_dir / "variables.auto.tfvars.json").write_text(json.dumps(tfvars, indent=2), encoding="utf-8")
          (workspace / "kv_targets.json").write_text(json.dumps(targets, indent=2), encoding="utf-8")

          print("\n=== Generated Files ===")
          print(f"  tfvars: {module_dir / 'variables.auto.tfvars.json'}")
          print(f"  targets: {workspace / 'kv_targets.json'}")

          kv_names = ",".join(t["name"] for t in targets)
          primary_region = next(iter(regions.keys()))

          # Write GitHub outputs
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"keyvault_name={keyvault_name}\n")
              out.write(f"primary_region={primary_region}\n")
              out.write(f"kv_names={kv_names}\n")
              out.write(f"subscription_id={subscription_id}\n")

          print(f"\n=== Summary ===")
          print(f"Primary region: {primary_region}")
          print(f"Key Vaults to deploy: {kv_names}")
          print("\n[SUCCESS] Payload validation complete!")
          PY

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check if Key Vaults exist
        id: check-akv
        run: |
          set -euo pipefail
          
          echo "=== Checking Key Vault Existence ==="
          az account set --subscription ${{ steps.payload.outputs.subscription_id }}
          echo "Using subscription: $(az account show --query name -o tsv)"

          ALL_EXISTS=true
          EXISTING_KVS=""
          MISSING_KVS=""

          while IFS='|' read -r kv_name kv_rg kv_region; do
            if [ -z "$kv_name" ] || [ -z "$kv_rg" ]; then
              echo "[ERROR] Missing key vault target details"
              exit 1
            fi

            echo -n "Checking $kv_name in $kv_rg ($kv_region)... "
            
            EXISTS=$(az keyvault show --name "$kv_name" --resource-group "$kv_rg" --query "id" -o tsv 2>/dev/null || echo "NOT_FOUND")
            
            if [ "$EXISTS" = "NOT_FOUND" ]; then
              ALL_EXISTS=false
              MISSING_KVS="${MISSING_KVS}${kv_name},"
              echo "NOT FOUND"
            else
              EXISTING_KVS="${EXISTING_KVS}${kv_name},"
              echo "EXISTS"
            fi
          done < <(python3 -c "
          import json
          from pathlib import Path
          import os
          targets = json.loads((Path(os.environ['GITHUB_WORKSPACE']) / 'kv_targets.json').read_text())
          for t in targets:
              print(f\"{t['name']}|{t['resource_group']}|{t['region']}\")
          ")

          echo ""
          echo "=== Existence Check Summary ==="
          if [ -n "$EXISTING_KVS" ]; then
            echo "Existing: ${EXISTING_KVS%,}"
          fi
          if [ -n "$MISSING_KVS" ]; then
            echo "Missing: ${MISSING_KVS%,}"
          fi

          if [ "$ALL_EXISTS" = true ]; then
            echo "akv_exists=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "[INFO] All Key Vaults already exist - Terraform will verify state"
          else
            echo "akv_exists=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "[INFO] One or more Key Vaults need to be created"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.4.7"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        id: tflint
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== TFLint ==="
          tflint --init
          tflint --format compact
          echo ""
          echo "[SUCCESS] TFLint passed"

      - name: Terraform Init
        id: init
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== Terraform Init ==="
          
          # Create local backend for testing (no remote state)
          cat > backend_override.tf <<'EOF'
          terraform {
            backend "local" {
              path = "terraform.tfstate"
            }
          }
          EOF
          
          terraform init -input=false
          terraform version

      - name: Terraform Validate
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== Terraform Validate ==="
          terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== Terraform Plan ==="
          terraform plan -input=false -out=tfplan
          
          echo ""
          echo "=== Plan Summary ==="
          terraform show -no-color tfplan | grep -E "Plan:|No changes|will be created|will be destroyed|will be updated" || true

      - name: Terraform Apply
        id: apply
        if: ${{ github.event.inputs.plan_only != 'true' }}
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== Terraform Apply ==="
          terraform apply -input=false -auto-approve tfplan

      - name: Show Outputs
        if: ${{ github.event.inputs.plan_only != 'true' && steps.apply.outcome == 'success' }}
        working-directory: ${{ github.workspace }}/infrastructure/akv-resilient
        run: |
          echo "=== Deployment Outputs ==="
          terraform output -json | jq .

      - name: Deployment Summary
        if: always()
        run: |
          echo "=== Deployment Summary ==="
          echo "Key Vaults: ${{ steps.payload.outputs.kv_names }}"
          echo "Plan Only: ${{ github.event.inputs.plan_only }}"
          echo ""
          echo "Step Results:"
          echo "  Payload Validation: ${{ steps.payload.outcome }}"
          echo "  AKV Check: ${{ steps.check-akv.outcome }}"
          echo "  Terraform Init: ${{ steps.init.outcome }}"
          echo "  Terraform Plan: ${{ steps.plan.outcome }}"
          echo "  Terraform Apply: ${{ steps.apply.outcome || 'skipped' }}"
